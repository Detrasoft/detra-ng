name: Publish to npm

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'projects/detra-ng/src/**'
      - 'package.json'
      - 'scripts/**'
  workflow_dispatch:    # permite rodar manualmente

jobs:
  build:
    name: Build & Publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run pre-publish checks
        run: node scripts/prepublish.mjs

      - name: Determine version bump
        id: bump
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "kind=${{ github.event.inputs.bump || 'patch' }}" >> $GITHUB_OUTPUT
          else
            echo "kind=patch" >> $GITHUB_OUTPUT
          fi

      - name: Bump version
        run: npm version ${{ steps.bump.outputs.kind }} --no-git-tag-version
        env:
          NPM_CONFIG_//registry.npmjs.org/:_authToken: ${{ secrets.NPM_TOKEN }}

      - name: Publish to npm
        run: npm publish --access=public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Commit & tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json
          git commit -m "chore(release): v$(node -p "require('./package.json').version")"
          git tag "v$(node -p "require('./package.json').version")"
          git push --follow-tags
