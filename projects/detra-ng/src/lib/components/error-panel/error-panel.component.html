<div class="ep-overlay" *ngIf="error" (click)="dismiss()">
  <div class="ep-panel" (click)="$event.stopPropagation()">
    <!-- ── Decorative top bar ── -->
    <div class="ep-top-bar">
      <div class="ep-top-bar__pulse"></div>
    </div>

    <!-- ── Header ── -->
    <div class="ep-header">
      <div class="ep-header__icon-wrap">
        <i class="fa-solid fa-circle-exclamation"></i>
      </div>
      <div class="ep-header__text">
        <h2 class="ep-header__title">{{ error.title || 'Preenchimento incorreto' }}</h2>
        <p class="ep-header__detail">{{ error.detail }}</p>
      </div>
      <button class="ep-close" (click)="dismiss()" aria-label="Fechar">
        <i class="fa-solid fa-xmark"></i>
      </button>
    </div>

    <!-- ── Error count badge ── -->
    <div class="ep-badge-row">
      <span class="ep-badge">
        <i class="fa-solid fa-list-check"></i>
        {{ errorCount }}
        {{ errorCount === 1 ? 'campo precisa de atenção' : 'campos precisam de atenção' }}
      </span>
    </div>

    <!-- ── Grouped error list ── -->
    <div class="ep-body">
      <div class="ep-group" *ngFor="let group of groupedErrors; let gi = index">
        <div class="ep-group__header">
          <i [class]="group.icon" class="ep-group__icon"></i>
          <span class="ep-group__label">{{ group.label }}</span>
          <span class="ep-group__count">{{ group.errors.length }}</span>
        </div>
        <ul class="ep-group__list">
          <li
            *ngFor="let err of group.errors; let i = index"
            class="ep-error-item"
            [style.animation-delay]="gi * 80 + i * 50 + 'ms'"
          >
            <span class="ep-error-item__bullet"></span>
            <span class="ep-error-item__msg">{{ err.message }}</span>
          </li>
        </ul>
      </div>
    </div>

    <!-- ── Footer ── -->
    <div class="ep-footer">
      <p class="ep-footer__hint">
        <i class="fa-solid fa-arrow-rotate-left"></i>
        Corrija os campos acima e tente salvar novamente
      </p>
      <button class="ep-footer__btn" (click)="dismiss()">
        <i class="fa-solid fa-pen-to-square"></i>
        Voltar ao formulário
      </button>
    </div>
  </div>
</div>
